name: PR Checks

on:
    push:
        branches: [main]
    pull_request:
        types: [opened, synchronize]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4

    - name: Install dependencies
      run: npm install

    - name: Build the project
      run: npm run build

    - name: Check code (format, lint, import sorting)
      run: npm run check

    - name: Run tests
      run: npm run test

    - name: Start dev server
      run: |
        npm run dev &
        echo $! > dev-server.pid

    - name: Wait for server to be ready
      run: npx wait-on http://localhost:3000 --timeout 60000

    - name: Run accessibility tests
      run: npm run accessibility

    - name: Stop dev server
      if: always()
      run: |
        if [ -f dev-server.pid ]; then
          kill "$(cat dev-server.pid)" || true
          rm dev-server.pid
        fi

    - name: Login to Azure Container Registry
      if: github.event_name == 'push'
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.ACR_LOGIN_SERVER }} # e.g. myregistry.azurecr.io
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and push Docker image to ACR
      if: github.event_name == 'push'
      run: |
        docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/team3-front-app:${{ github.sha }} .
        docker tag ${{ secrets.ACR_LOGIN_SERVER }}/team3-front-app:${{ github.sha }} ${{ secrets.ACR_LOGIN_SERVER }}/team3-front-app:latest
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/team3-front-app:${{ github.sha }}
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/team3-front-app:latest
